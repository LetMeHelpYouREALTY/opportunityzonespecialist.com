# Deploys main → Vercel production when Git integration is unavailable.
# Required repo secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN          — https://vercel.com/account/tokens
#   VERCEL_ORG_ID         — team_EIbjFXaDDtGMTweb5Hvo3CG3
#   VERCEL_PROJECT_ID     — prj_OPeHlqAs7VKjCibR3xLONmQm2LbW
#
# Prefer connecting the GitHub repo in Vercel UI (Settings → Git) so this
# workflow is unnecessary. Keep this as a fallback until that link exists.

name: Vercel Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.VERCEL_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel env
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
